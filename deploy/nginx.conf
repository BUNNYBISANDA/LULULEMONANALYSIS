server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # App uses HashRouter (#/analytics, #/reviews, ...), so a single index.html
    # fallback is enough for any refresh or deep link.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Dashboard JSON is regenerated by the pipeline; don't let browsers cache it.
    location /data/dashboard_data/ {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri =404;
    }

    location ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}
