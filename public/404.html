<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>lululemon Review Intelligence Dashboard</title>
    <script>
      const locationToRedirect = window.location
      const pathSegmentsToKeep = 1
      const redirectPath =
        locationToRedirect.protocol +
        '//' +
        locationToRedirect.hostname +
        (locationToRedirect.port ? ':' + locationToRedirect.port : '') +
        '/lululemon/?/' +
        locationToRedirect.pathname
          .slice(1)
          .split('/')
          .slice(pathSegmentsToKeep)
          .join('/')
          .replace(/&/g, '~and~') +
        (locationToRedirect.search
          ? '&' + locationToRedirect.search.slice(1).replace(/&/g, '~and~')
          : '') +
        locationToRedirect.hash

      window.location.replace(redirectPath)
    </script>
  </head>
  <body></body>
</html>
